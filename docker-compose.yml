version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    restart: always
    ports:
      - "1883:1883"   # Основной порт для ESP и Go
      - "9001:9001"   # Порт для WebSockets (если понадобится для Web-UI)
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log

  go-server:
    build: ./server                  # путь к Dockerfile
    container_name: go-server
    restart: always
    ports:
      - "${GRPC_PORT}:${GRPC_PORT}"                 # снаружи:внутри, если ваш сервер слушает 8080
    depends_on:
      - mqtt                         # запускать только после старта mqtt
    env_file:
      - env/.env.go.app
      - env/.env.db
  
  db:
    image: mysql:8.0
    container_name: ${MYSQL_CONTAINER_NAME}
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:docker-entrypoint-initdb.d/init.sql
    env_file:
      - env/.env.db

volumes:
  mqtt-data:
  mqtt-log: