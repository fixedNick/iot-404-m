name: client
description: "IoT-404 Client"
version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3

  cupertino_icons: ^1.0.8

  grpc: ^5.1.0
  protobuf: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/bg.jpg

  fonts:
    - family: AppleSanFrancisco
      fonts:
        - asset: assets/fonts/apple/sf-pro-text-light.ttf
          weight: 400
        - asset: assets/fonts/apple/sf-pro-text-regular.ttf
          weight: 600