syntax = "proto3";

package iot_proto.v1;
option go_package = "./pb";

service ESP8266Service {
  // -- getters
  rpc WindSpeed (WindSpeedRequest) returns (WindSpeedResponse) {}
  rpc Temperature (TemperatureRequest) returns (TemperatureResponse) {}
  rpc Humidity (HumidityRequest) returns (HumidityResponse) {}
  // -- end getters
  rpc AutoCollect (AutoCollectRequest) returns (AutoCollectResponse) {}
  rpc StopAutoCollect (StopAutoCollectRequest) returns (StopAutoCollectResponse) {}
}
message WindSpeedRequest {}
message TemperatureRequest {}
message HumidityRequest {}
message WindSpeedResponse { 
    float voltage = 1;
    float speed = 2; 
    int64 time = 3;
}
message TemperatureResponse {
  float temperature = 1;
  int64 time = 2;
}
message HumidityResponse {
  float humidity = 1;
  int64 time = 2;
}
message StopAutoCollectRequest {
  string sensor = 1;
}
message AutoCollectRequest {
  string sensor = 1;
  uint64 period = 2;
  uint64 duration =3;
}
message AutoCollectResponse {
  bool success = 1;
}
message StopAutoCollectResponse {
  bool success = 1;
}